version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Athens'
    open-pull-requests-limit: 10
    assignees:
      - 'Alexr2391'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      dev-dependencies:
        dependency-type: 'development'
      production-patches:
        dependency-type: 'production'
        update-types: ['minor', 'patch']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'

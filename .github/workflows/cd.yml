name: CD Docker Build & Push

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    release:
        types: [published]

permissions:
    contents: read
    packages: write

jobs:
    docker:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Extract version from tag
              id: version
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.PAT_TOKEN }}

            - name: Lowercase repository name
              id: repo
              run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

            - name: Select Dockerfile
              id: dockerfile
              run: |
                  if [ "${{ github.event.release.prerelease }}" = "true" ]; then
                    echo "file=Dockerfile.dev" >> $GITHUB_OUTPUT
                  else
                    echo "file=Dockerfile" >> $GITHUB_OUTPUT
                  fi

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ${{ steps.dockerfile.outputs.file }}
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: |
                      ghcr.io/${{ steps.repo.outputs.name }}:${{ steps.version.outputs.VERSION }}
                      ghcr.io/${{ steps.repo.outputs.name }}:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

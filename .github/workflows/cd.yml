name: CD Release & Docker Build

on:
    release:
        types: [published]

permissions:
    contents: write
    packages: write

jobs:
    docker:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2
              with:
                  version: latest

            - name: Cache Docker layers
              uses: actions/cache@v3
              with:
                  path: ~/.cache/docker
                  key: ${{ runner.os }}-docker-${{ hashFiles('Dockerfile', 'package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-docker-

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.PAT_TOKEN }}

            - name: Extract version from tag
              id: version
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Build Docker image with Buildx
              run: |
                  REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')  # Convert repo name to lowercase
                  docker buildx build \
                    --file Dockerfile \
                    --tag ghcr.io/${REPO_NAME}:${{ steps.version.outputs.VERSION }} \
                    --tag ghcr.io/${REPO_NAME}:latest \
                    --platform linux/amd64,linux/arm64 .  # Multi-platform build
                    --push  # Push the image to GitHub Container Registry

            - name: Push Docker images
              run: |
                  REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
                  docker push ghcr.io/${REPO_NAME}:${{ steps.version.outputs.VERSION }}  # Push versioned tag
                  docker push ghcr.io/${REPO_NAME}:latest  # Push latest tag

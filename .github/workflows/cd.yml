name: CD Release & Docker Build

on:
    push:
        branches: [main, beta]
        tags:
            - "v*"

permissions:
    contents: write
    packages: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm ci

            - name: Build Next.js (if required)
              run: npm run build

            - name: Run semantic-release
              run: npx semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    docker:
        needs: release
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2
              with:
                  version: latest

            - name: Cache Docker layers
              uses: actions/cache@v3
              with:
                  path: ~/.cache/docker
                  key: ${{ runner.os }}-docker-${{ hashFiles('Dockerfile', 'package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-docker-

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract version from tag
              id: version
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Build Docker image with Buildx
              run: |
                  docker buildx build \
                    --file Dockerfile \
                    --tag ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }} \
                    --tag ghcr.io/${{ github.repository }}:latest \
                    --platform linux/amd64,linux/arm64 .  # Multi-platform build (adjust platforms as needed)

            - name: Push Docker images
              run: |
                  docker push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
                  docker push ghcr.io/${{ github.repository }}:latest

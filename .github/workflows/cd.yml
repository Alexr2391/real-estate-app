name: CD Release & Docker Build

on:
    push:
        branches: [main, develop] # Triggers on push to these branches, i.e., when something is merged into `main` or `develop`
    pull_request:
        branches: [main, develop] # Triggers on PR merge to these branches, i.e., when PRs are merged into `main` or `develop`
    # You can still have the `tags` trigger if you want to build when tags are pushed
    # tags:
    #   - "v*"  # Trigger for version tags like v1.0.0, v2.0.0, etc.

permissions:
    contents: write
    packages: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Fetch full history to make semantic-release work correctly

            - name: Setup Node 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm ci

            - name: Build Next.js (if required)
              run: npm run build

            - name: Run semantic-release
              run: npx semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    docker:
        needs: release
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2
              with:
                  version: latest # Use the latest version of Buildx

            - name: Cache Docker layers
              uses: actions/cache@v3
              with:
                  path: ~/.cache/docker
                  key: ${{ runner.os }}-docker-${{ hashFiles('Dockerfile', 'package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-docker-

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }} # Use GitHub's token for authentication

            - name: Extract version from tag
              id: version
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
              # Extract the version number from the tag name (like v1.0.0)

            - name: Build Docker image with Buildx
              run: |
                  REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')  # Convert repo name to lowercase
                  docker buildx build \
                    --file Dockerfile \
                    --tag ghcr.io/${REPO_NAME}:${{ steps.version.outputs.VERSION }} \
                    --tag ghcr.io/${REPO_NAME}:latest \
                    --platform linux/amd64,linux/arm64 .  # Multi-platform build
                    --push  # Push the image to GitHub Container Registry

            - name: Push Docker images
              run: |
                  REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
                  docker push ghcr.io/${REPO_NAME}:${{ steps.version.outputs.VERSION }}  # Push versioned tag
                  docker push ghcr.io/${REPO_NAME}:latest  # Push latest tag
              # Push both the versioned and latest tags to GitHub Container Registry
